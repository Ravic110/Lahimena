[flake8]
max-line-length = 88
# Ignore: E501 (line too long), F401 (unused import), F722 (syntax error in type), 
# W293/W291 (blank line whitespace), E203 (space before colon), F541 (missing placeholder),
# W503 (line break before operator), F841 (assigned but never used - intentional for UI elements)
ignore = E501,F401,F722,W293,W291,E203,F541,W503,F841
# exclude external/generated code and data folders
exclude = .git,__pycache__,env,.env,venv,.venv,build,dist,finances,gui/forms,TsaraKonta,backups,tests/fixtures,tests/sample_*

[tool:black]
line-length = 88

[isort]
profile = black
